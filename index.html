<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>My PWA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="js/manifest.json">
</head>

<body>
    <h2>Welcome to my PWA.</h2>
    <p>This is a simple Progressive Web App(PWA) example.</p>
    <img src="imgs/img-mobile.png" alt="img-mobile" style="display: none;" />
    <img src="imgs/img-desktop.png" alt="img-desktop" style="display: none;" />
    <button id="install-btn"
        style="display: block; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
        Install App
    </button>
    <script src="js/app.js"></script>
</body>

</html>
